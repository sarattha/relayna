name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate release metadata
        run: python3 scripts/validate-release-metadata.py "${{ github.ref_name }}"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run SDK tests
        run: uv run pytest tests -q

      - name: Sync Studio backend dependencies
        run: make -C studio/backend sync

      - name: Run Studio backend tests
        run: make -C studio/backend test

      - name: Build artifacts
        run: uv build

      - name: Validate built distributions
        run: uv run twine check dist/*

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SDK SBOM
        run: |
          syft dist --output spdx-json=relayna-sdk-${{ github.ref_name }}.spdx.json

      - name: Attest SDK provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Extract Studio backend Docker metadata
        id: studio-backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Studio backend Docker image
        id: studio-backend-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: studio/backend/Dockerfile
          push: true
          tags: ${{ steps.studio-backend-meta.outputs.tags }}
          labels: ${{ steps.studio-backend-meta.outputs.labels }}
          provenance: true
          sbom: false

      - name: Generate Studio backend image SBOM
        run: |
          syft "${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-backend@${{ steps.studio-backend-build.outputs.digest }}" \
            --output spdx-json=relayna-studio-backend-${{ github.ref_name }}.spdx.json

      - name: Scan Studio backend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-backend@${{ steps.studio-backend-build.outputs.digest }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Sign Studio backend image
        env:
          COSIGN_YES: "true"
        run: cosign sign "${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-backend@${{ steps.studio-backend-build.outputs.digest }}"

      - name: Attest Studio backend image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-backend
          subject-digest: ${{ steps.studio-backend-build.outputs.digest }}
          push-to-registry: true

      - name: Extract Studio frontend Docker metadata
        id: studio-frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Studio frontend Docker image
        id: studio-frontend-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/studio/Dockerfile
          push: true
          tags: ${{ steps.studio-frontend-meta.outputs.tags }}
          labels: ${{ steps.studio-frontend-meta.outputs.labels }}
          provenance: true
          sbom: false

      - name: Generate Studio frontend image SBOM
        run: |
          syft "${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-frontend@${{ steps.studio-frontend-build.outputs.digest }}" \
            --output spdx-json=relayna-studio-frontend-${{ github.ref_name }}.spdx.json

      - name: Scan Studio frontend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-frontend@${{ steps.studio-frontend-build.outputs.digest }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Sign Studio frontend image
        env:
          COSIGN_YES: "true"
        run: cosign sign "${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-frontend@${{ steps.studio-frontend-build.outputs.digest }}"

      - name: Attest Studio frontend image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-frontend
          subject-digest: ${{ steps.studio-frontend-build.outputs.digest }}
          push-to-registry: true

      - name: Extract release notes from changelog
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib

          version = os.environ["RELEASE_VERSION"].lstrip("v")
          changelog = pathlib.Path("CHANGELOG.md").read_text().splitlines()
          target = f"## {version} -"
          capture = False
          lines = []

          for line in changelog:
              if line.startswith("## "):
                  if capture:
                      break
                  capture = line.startswith(target)
                  continue
              if capture:
                  lines.append(line)

          text = "\n".join(lines).strip()
          if not text:
              raise SystemExit(f"Unable to find CHANGELOG section for {version}")
          pathlib.Path("release-notes.md").write_text(text + "\n")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.whl
            relayna-sdk-${{ github.ref_name }}.spdx.json
            relayna-studio-backend-${{ github.ref_name }}.spdx.json
            relayna-studio-frontend-${{ github.ref_name }}.spdx.json
