name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io

jobs:
  sdk:
    name: sdk (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync SDK dependencies
        run: make sync

      - name: Run SDK format check
        run: make format

      - name: Verify SDK formatting left no changes
        run: git diff --exit-code

      - name: Run SDK autofix check
        run: make fix

      - name: Verify SDK fixes left no changes
        run: git diff --exit-code

      - name: Run SDK lint
        run: make lint

      - name: Run SDK typecheck
        run: make typecheck

      - name: Run SDK tests
        run: make test

      - name: Build SDK artifacts
        run: uv build

      - name: Validate built SDK distributions
        run: uv run twine check dist/*

      - name: Validate release metadata
        run: python3 scripts/validate-release-metadata.py

      - name: Smoke test installed SDK wheel
        run: |
          python -m venv "$RUNNER_TEMP/relayna-smoke"
          . "$RUNNER_TEMP/relayna-smoke/bin/activate"
          pip install dist/relayna-*.whl
          python - <<'PY'
          import importlib

          modules = [
              "relayna",
              "relayna.contracts",
              "relayna.rabbitmq",
              "relayna.consumer",
              "relayna.status",
              "relayna.api",
              "relayna.workflow",
              "relayna.observability",
              "relayna.topology",
              "relayna.mcp",
              "relayna.dlq",
          ]
          for name in modules:
              importlib.import_module(name)
          PY

  security:
    name: security hardening
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/studio/package-lock.json

      - name: Sync SDK dependencies
        run: make sync

      - name: Audit SDK dependencies
        run: make security-sdk

      - name: Sync Studio backend dependencies
        run: make -C studio/backend sync

      - name: Audit Studio backend dependencies
        run: make -C studio/backend security

      - name: Sync Studio frontend dependencies
        run: make -C apps/studio sync

      - name: Audit Studio frontend dependencies
        run: make security-frontend

      - name: Scan repository filesystem with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Detect committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: .semgrep.yml

  studio-backend:
    name: studio-backend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync Studio backend dependencies
        run: make -C studio/backend sync

      - name: Run Studio backend format check
        run: make -C studio/backend format

      - name: Verify Studio backend formatting left no changes
        run: git diff --exit-code

      - name: Run Studio backend autofix check
        run: make -C studio/backend fix

      - name: Verify Studio backend fixes left no changes
        run: git diff --exit-code

      - name: Run Studio backend lint
        run: make -C studio/backend lint

      - name: Run Studio backend typecheck
        run: make -C studio/backend typecheck

      - name: Run Studio backend tests
        run: make -C studio/backend test

      - name: Build Studio backend wheel
        run: make -C studio/backend build

      - name: Build Studio backend Docker image
        run: make -C studio/backend docker-build

      - name: Scan Studio backend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: relayna-studio-backend:latest
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Detect Studio backend version bump
        id: studio-backend-version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PUSH_BASE_SHA: ${{ github.event.before }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          import os
          import subprocess
          from pathlib import Path

          path = "studio/backend/pyproject.toml"
          push_base_sha = os.environ["PUSH_BASE_SHA"]
          current_text = Path(path).read_text()
          previous_text = subprocess.run(
              ["git", "show", f"{push_base_sha}:{path}"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout

          version_pattern = re.compile(r'^version = "([^"]+)"$', re.MULTILINE)
          current = version_pattern.search(current_text).group(1)
          previous = version_pattern.search(previous_text).group(1)
          major_minor = ".".join(current.split(".")[:2])

          print(f"version={current}")
          print(f"major_minor={major_minor}")
          print(f"changed={str(current != previous).lower()}")
          PY

      - name: Log in to GitHub Container Registry
        if: steps.studio-backend-version.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.studio-backend-version.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Install Syft
        if: steps.studio-backend-version.outputs.changed == 'true'
        uses: anchore/sbom-action/download-syft@v0

      - name: Set up Cosign
        if: steps.studio-backend-version.outputs.changed == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Extract Studio backend Docker metadata
        id: studio-backend-meta
        if: steps.studio-backend-version.outputs.changed == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-backend
          tags: |
            type=raw,value=${{ steps.studio-backend-version.outputs.version }}
            type=raw,value=${{ steps.studio-backend-version.outputs.major_minor }}
            type=raw,value=latest

      - name: Push Studio backend Docker image
        if: steps.studio-backend-version.outputs.changed == 'true'
        id: studio-backend-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: studio/backend/Dockerfile
          push: true
          tags: ${{ steps.studio-backend-meta.outputs.tags }}
          labels: ${{ steps.studio-backend-meta.outputs.labels }}
          provenance: true
          sbom: false

      - name: Generate Studio backend image SBOM
        if: steps.studio-backend-version.outputs.changed == 'true'
        run: |
          syft "${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-backend@${{ steps.studio-backend-build.outputs.digest }}" \
            --output spdx-json=relayna-studio-backend-${{ steps.studio-backend-version.outputs.version }}.spdx.json

      - name: Scan pushed Studio backend image with Trivy
        if: steps.studio-backend-version.outputs.changed == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-backend@${{ steps.studio-backend-build.outputs.digest }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Sign Studio backend image
        if: steps.studio-backend-version.outputs.changed == 'true'
        env:
          COSIGN_YES: "true"
        run: cosign sign "${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-backend@${{ steps.studio-backend-build.outputs.digest }}"

      - name: Attest Studio backend image provenance
        if: steps.studio-backend-version.outputs.changed == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-backend
          subject-digest: ${{ steps.studio-backend-build.outputs.digest }}
          push-to-registry: true

  studio-frontend:
    name: studio-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/studio/package-lock.json

      - name: Sync Studio frontend dependencies
        run: make -C apps/studio sync

      - name: Run Studio frontend tests
        run: make -C apps/studio test

      - name: Build Studio frontend bundle
        run: make -C apps/studio build

      - name: Build Studio frontend Docker image
        run: make -C apps/studio docker-build

      - name: Scan Studio frontend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: relayna-studio-frontend:latest
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Detect Studio frontend version bump
        id: studio-frontend-version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PUSH_BASE_SHA: ${{ github.event.before }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import subprocess
          from pathlib import Path

          path = "apps/studio/package.json"
          push_base_sha = os.environ["PUSH_BASE_SHA"]
          current = json.loads(Path(path).read_text())["version"]
          previous = json.loads(
              subprocess.run(
                  ["git", "show", f"{push_base_sha}:{path}"],
                  check=True,
                  capture_output=True,
                  text=True,
              ).stdout
          )["version"]
          major_minor = ".".join(current.split(".")[:2])

          print(f"version={current}")
          print(f"major_minor={major_minor}")
          print(f"changed={str(current != previous).lower()}")
          PY

      - name: Log in to GitHub Container Registry
        if: steps.studio-frontend-version.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.studio-frontend-version.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Install Syft
        if: steps.studio-frontend-version.outputs.changed == 'true'
        uses: anchore/sbom-action/download-syft@v0

      - name: Set up Cosign
        if: steps.studio-frontend-version.outputs.changed == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Extract Studio frontend Docker metadata
        id: studio-frontend-meta
        if: steps.studio-frontend-version.outputs.changed == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-frontend
          tags: |
            type=raw,value=${{ steps.studio-frontend-version.outputs.version }}
            type=raw,value=${{ steps.studio-frontend-version.outputs.major_minor }}
            type=raw,value=latest

      - name: Push Studio frontend Docker image
        if: steps.studio-frontend-version.outputs.changed == 'true'
        id: studio-frontend-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/studio/Dockerfile
          push: true
          tags: ${{ steps.studio-frontend-meta.outputs.tags }}
          labels: ${{ steps.studio-frontend-meta.outputs.labels }}
          provenance: true
          sbom: false

      - name: Generate Studio frontend image SBOM
        if: steps.studio-frontend-version.outputs.changed == 'true'
        run: |
          syft "${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-frontend@${{ steps.studio-frontend-build.outputs.digest }}" \
            --output spdx-json=relayna-studio-frontend-${{ steps.studio-frontend-version.outputs.version }}.spdx.json

      - name: Scan pushed Studio frontend image with Trivy
        if: steps.studio-frontend-version.outputs.changed == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-frontend@${{ steps.studio-frontend-build.outputs.digest }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Sign Studio frontend image
        if: steps.studio-frontend-version.outputs.changed == 'true'
        env:
          COSIGN_YES: "true"
        run: cosign sign "${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-frontend@${{ steps.studio-frontend-build.outputs.digest }}"

      - name: Attest Studio frontend image provenance
        if: steps.studio-frontend-version.outputs.changed == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/relayna-studio-frontend
          subject-digest: ${{ steps.studio-frontend-build.outputs.digest }}
          push-to-registry: true
