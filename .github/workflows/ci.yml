name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    name: test-and-build (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run make format
        run: make format

      - name: Verify formatting left no changes
        run: git diff --exit-code

      - name: Run make fix
        run: make fix

      - name: Verify fixes left no changes
        run: git diff --exit-code

      - name: Run make lint
        run: make lint

      - name: Run make typecheck
        run: make typecheck

      - name: Run make test
        run: make test

      - name: Build artifacts
        run: uv build

      - name: Validate built distributions
        run: uv run twine check dist/*

      - name: Smoke test installed wheel
        run: |
          python -m venv "$RUNNER_TEMP/relayna-smoke"
          . "$RUNNER_TEMP/relayna-smoke/bin/activate"
          pip install dist/relayna-*.whl
          python - <<'PY'
          import importlib

          modules = [
              "relayna",
              "relayna.contracts",
              "relayna.rabbitmq",
              "relayna.consumer",
              "relayna.status",
              "relayna.api",
              "relayna.workflow",
              "relayna.observability",
              "relayna.topology",
              "relayna.mcp",
              "relayna.studio",
              "relayna.dlq",
          ]
          for name in modules:
              importlib.import_module(name)
          PY
